services:
  - type: web
    name: fyp-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SKIP_FINBERT_PRELOAD
        value: "true"
      - key: SCRAPER_API_KEY
        sync: false
