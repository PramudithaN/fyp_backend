name: Daily Oil News Scraper

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allows manual triggering from GitHub UI
    inputs:
      target_date:
        description: "Date to scrape (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""

jobs:
  scrape:
    name: Trigger scraper on Render API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Call /scraper/run
        id: scrape
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          BASE="$BACKEND_API_URL"
          DATE="$TARGET_DATE"
          if [ -n "$DATE" ]; then
            ENDPOINT="${BASE}/scraper/run?target_date=${DATE}"
          else
            ENDPOINT="${BASE}/scraper/run"
          fi

          RESPONSE=$(curl --silent --show-error --fail \
            --max-time 600 \
            -X POST "$ENDPOINT" \
            -H "X-Scraper-Key: $SCRAPER_API_KEY" \
            -H "Content-Type: application/json")
          echo "response=$RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Report result
        run: |
          STATUS="${{ steps.scrape.outputs.status }}"
          echo "Scraper status: $STATUS"
          if [ "$STATUS" = "error" ]; then
            echo "::error::Scraper returned an error — check the response above"
            exit 1
          fi
