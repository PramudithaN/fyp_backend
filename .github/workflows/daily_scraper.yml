name: Daily Oil News Scraper

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allows manual triggering from GitHub UI
    inputs:
      target_date:
        description: "Date to scrape (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""

jobs:
  scrape:
    name: Trigger scraper on Render API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Build request URL
        id: url
        run: |
          BASE="${{ secrets.BACKEND_API_URL }}"
          DATE="${{ github.event.inputs.target_date }}"
          if [ -n "$DATE" ]; then
            echo "endpoint=${BASE}/scraper/run?target_date=${DATE}" >> "$GITHUB_OUTPUT"
          else
            echo "endpoint=${BASE}/scraper/run" >> "$GITHUB_OUTPUT"
          fi

      - name: Call /scraper/run
        id: scrape
        run: |
          RESPONSE=$(curl --silent --show-error --fail \
            --max-time 600 \
            -X POST "${{ steps.url.outputs.endpoint }}" \
            -H "X-Scraper-Key: ${{ secrets.SCRAPER_API_KEY }}" \
            -H "Content-Type: application/json")
          echo "response=$RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "response=$RESPONSE" >> "$GITHUB_OUTPUT"

      - name: Report result
        run: |
          STATUS="${{ steps.scrape.outputs.status }}"
          echo "Scraper status: $STATUS"
          if [ "$STATUS" = "error" ]; then
            echo "::error::Scraper returned an error — check the response above"
            exit 1
          fi
