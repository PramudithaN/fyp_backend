# SonarCloud Configuration for Oil Price Prediction Backend
sonar.projectKey=PramudithaN_fyp_backend
sonar.organization=pramudithan

# Project Information
sonar.projectName=Oil Price Prediction Backend
sonar.projectVersion=1.0

# Source Code
sonar.sources=app
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python specific settings
sonar.python.version=3.9,3.10,3.11,3.12

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclude patterns
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.*,**/.venv/**,**/venv/**,**/model_artifacts/**,**/htmlcov/**,**/.pytest_cache/**

# Test exclusions (don't analyze test code)
sonar.test.exclusions=tests/**

# Code Duplication
sonar.cpd.python.minimumLines=10

# Coverage exclusions (files not included in coverage)
sonar.coverage.exclusions=tests/**,**/__init__.py,app/config.py

# Quality Gate settings
sonar.qualitygate.wait=false
